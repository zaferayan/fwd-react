<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMG Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?&family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div class="hero-content">
          <div class="hero-top">
            <div class="hero-brand">
              <img
                class="hero-logo"
                src="./logo-small-black.png"
                alt="DMG Coffee logo"
              />
              <span class="eyebrow">DMG Coffee</span>
            </div>

            <div class="user-menu">
              <button
                id="userMenuBtn"
                class="user-menu-btn"
                type="button"
                aria-expanded="false"
                aria-controls="userMenuPanel"
                aria-label="Kullanıcı menüsü"
              >
                <svg
                  class="user-menu-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 90 90"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path
                    d="M 45 0 C 20.147 0 0 20.147 0 45 c 0 24.853 20.147 45 45 45 s 45 -20.147 45 -45 C 90 20.147 69.853 0 45 0 z M 45 22.007 c 8.899 0 16.14 7.241 16.14 16.14 c 0 8.9 -7.241 16.14 -16.14 16.14 c -8.9 0 -16.14 -7.24 -16.14 -16.14 C 28.86 29.248 36.1 22.007 45 22.007 z M 45 83.843 c -11.135 0 -21.123 -4.885 -27.957 -12.623 c 3.177 -5.75 8.144 -10.476 14.05 -13.341 c 2.009 -0.974 4.354 -0.958 6.435 0.041 c 2.343 1.126 4.857 1.696 7.473 1.696 c 2.615 0 5.13 -0.571 7.473 -1.696 c 2.083 -1 4.428 -1.015 6.435 -0.041 c 5.906 2.864 10.872 7.591 14.049 13.341 C 66.123 78.957 56.135 83.843 45 83.843 z"
                  />
                </svg>
              </button>

              <div
                id="userMenuPanel"
                class="user-menu-panel"
                aria-hidden="true"
              >
                <div class="user-menu-content">
                  <p id="authStatus" class="muted">Giriş yapılmadı.</p>
                  <div id="authMessage" class="muted"></div>

                  <div class="user-menu-actions">
                    <a
                      id="loginLink"
                      class="btn-ghost user-link"
                      href="./login.html?redirect=./index.html"
                      >Giriş Yap</a
                    >
                    <a
                      id="registerLink"
                      class="btn-primary user-link"
                      href="./register.html?redirect=./index.html"
                      >Kayıt Ol</a
                    >
                    <button id="logoutBtn" class="btn-ghost" type="button">
                      Çıkış Yap
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panels three-column-layout">
        <article class="panel filter-panel">
          <h2 class="controls-title">Filtre ve Sıralama</h2>
          <form id="filterForm">
            <div class="field full">
              <label for="searchInput">Ara</label>
              <input
                id="searchInput"
                name="search"
                placeholder="Latte, cappuccino, mocha..."
              />
            </div>

            <div class="field">
              <label for="typeSelect">Kavrum</label>
              <select id="typeSelect" name="type">
                <option value="all">Hepsi</option>
                <option value="Light">Light</option>
                <option value="Medium">Medium</option>
                <option value="Dark">Dark</option>
              </select>
            </div>

            <div class="field">
              <label for="sortSelect">Sırala</label>
              <select id="sortSelect" name="sortBy">
                <option value="name">İsim (A-Z)</option>
                <option value="priceAsc">Fiyat (Artan)</option>
                <option value="priceDesc">Fiyat (Azalan)</option>
                <option value="ratingDesc">Puan (Yüksek)</option>
              </select>
            </div>

            <div class="field">
              <label for="maxPriceInput">Maks Fiyat (TL)</label>
              <input
                id="maxPriceInput"
                name="maxPrice"
                type="number"
                min="100"
                max="500"
                step="10"
                value="500"
              />
            </div>

            <div class="field">
              <label for="minRatingInput">Min Puan</label>
              <input
                id="minRatingInput"
                name="minRating"
                type="number"
                min="1"
                max="5"
                step="0.1"
                value="1"
              />
            </div>

            <div class="actions">
              <button class="btn-primary" type="submit">Uygula</button>
              <button id="resetBtn" class="btn-ghost" type="button">
                Sıfırla
              </button>
            </div>
          </form>

          <div id="errorBox"></div>

          <div class="stats-grid" id="statsGrid"></div>
        </article>

        <section class="panel coffee-panel">
          <div class="cards-title">Kahveler</div>
          <p class="muted" id="resultInfo">Veri yükleniyor...</p>
          <div class="grid" id="coffeeGrid"></div>
        </section>

        <aside class="side-stack">
          <article class="panel">
            <h2 class="controls-title">Favoriler</h2>
            <ul id="favoritesList" class="favorites-list"></ul>
          </article>

          <article class="panel">
            <h2 class="controls-title">Sepet</h2>
            <form id="cartForm" class="cart-form">
              <ul id="cartList" class="cart-items"></ul>
              <div id="cartSummary" class="cart-summary"></div>
              <button
                id="checkoutBtn"
                class="btn-primary checkout-btn"
                type="submit"
              >
                Ödeme Yap
              </button>
            </form>
          </article>
        </aside>
      </section>
    </main>

    <div id="detailModal" class="modal" aria-hidden="true">
      <article class="modal-card">
        <img id="modalImage" class="modal-cover" alt="Kahve görseli" />
        <div class="modal-content">
          <div class="modal-head">
            <h2 id="modalTitle">Kahve Detayı</h2>
            <button id="modalCloseBtn" class="close-btn" type="button">
              Kapat
            </button>
          </div>
          <p id="modalDesc" class="coffee-desc"></p>
          <p id="modalIngredients" class="coffee-desc"></p>
          <p id="modalMeta" class="coffee-desc"></p>
        </div>
      </article>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
